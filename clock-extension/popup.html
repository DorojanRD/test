<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container-fluid p-3">
        <!-- Header cu ceasul principal -->
        <div class="text-center mb-3">
            <h4 class="mb-2">
                <i class="bi bi-clock-fill me-2"></i>
                Ceas & Calendar
            </h4>
            <div class="time-display p-3 rounded">
                <div id="time" class="display-6 fw-bold">--:--:--</div>
                <div id="date" class="text-muted">-- --- ----</div>
            </div>
        </div>

        <!-- Butoane pentru navigare -->
        <div class="row mb-3">
            <div class="col-6">
                <button id="showClock" class="btn btn-primary w-100 active">
                    <i class="bi bi-clock"></i> Ceas
                </button>
            </div>
            <div class="col-6">
                <button id="showCalendar" class="btn btn-outline-primary w-100">
                    <i class="bi bi-calendar3"></i> Calendar
                </button>
            </div>
        </div>

        <!-- Secțiunea Ceas -->
        <div id="clockSection">
            <div class="row g-2 mb-3">
                <div class="col-4">
                    <div class="card text-center h-100">
                        <div class="card-body p-2">
                            <h6 class="card-title mb-1">Ora</h6>
                            <p id="currentHour" class="card-text h5 mb-0">--</p>
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card text-center h-100">
                        <div class="card-body p-2">
                            <h6 class="card-title mb-1">Min</h6>
                            <p id="currentMinute" class="card-text h5 mb-0">--</p>
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card text-center h-100">
                        <div class="card-body p-2">
                            <h6 class="card-title mb-1">Sec</h6>
                            <p id="currentSecond" class="card-text h5 mb-0">--</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="alert alert-info p-2 mb-0">
                <small>
                    <i class="bi bi-info-circle me-1"></i>
                    Ziua <span id="dayOfYear">---</span> din anul <span id="currentYear">----</span>
                </small>
            </div>
        </div>

        <!-- Secțiunea Calendar -->
        <div id="calendarSection" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <button id="prevMonth" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <h6 id="calendarTitle" class="mb-0">--- ----</h6>
                <button id="nextMonth" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
            
            <div id="calendar" class="calendar-grid">
                <!-- Calendar se va genera prin JS -->
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
